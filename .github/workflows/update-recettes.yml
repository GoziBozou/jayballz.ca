name: Mise à jour hebdomadaire des recettes santé

# Quand rouler ce workflow
on:
  schedule:
    # Tous les jeudis à 12:30 UTC = 8:30 AM heure du Québec (30 min après /food)
    - cron: '30 12 * * 4'

  # Permet de déclencher manuellement
  workflow_dispatch:

# Permissions
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le repo
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rouler le générateur de recettes
        run: |
          python3 recettes/scripts/generate_recettes.py

      - name: Commit et push si changements
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add recettes/index.html
          if git diff --staged --quiet; then
            echo "✅ Aucun changement détecté."
          else
            git commit -m "🥗 Mise à jour hebdomadaire des recettes ($(date -u +%Y-%m-%d))"
            git push
            echo "✅ Page recettes mise à jour et publiée."
          fi
